<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Школа вожатых | Тапай</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .animation-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Анимация звёздочек (как молнии в Россетях) */
        .star {
            position: absolute;
            color: #ffd700;
            filter: drop-shadow(0 0 15px #ffd700);
            animation: starFlash 0.8s ease-out forwards;
            z-index: 25;
            transform-origin: center;
            font-size: 2rem;
        }

        @keyframes starFlash {
            0% {
                opacity: 1;
                transform: scale(0.5) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.5) rotate(15deg);
                filter: drop-shadow(0 0 30px #ffd700);
            }
            100% {
                opacity: 0;
                transform: scale(2) rotate(-15deg) translateY(-30px);
                filter: drop-shadow(0 0 40px #ffd700);
            }
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 12px 0 #c0392b, 0 20px 30px rgba(0, 0, 0, 0.2); }
            50% { box-shadow: 0 12px 0 #c0392b, 0 20px 40px rgba(255, 107, 107, 0.6); }
            100% { box-shadow: 0 12px 0 #c0392b, 0 20px 30px rgba(0, 0, 0, 0.2); }
        }

        .button-pulse {
            animation: buttonPulse 0.3s ease-out !important;
        }

        .button-press {
            transform: translateY(8px) !important;
            transition: transform 0.05s linear;
        }

        .counter-pop {
            animation: counterPop 0.2s ease-out;
        }

        @keyframes counterPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff5252; }
            100% { transform: scale(1); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
            padding: 8px 0;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
        }

        .logo-container h2 {
            color: #ff6b6b;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo-container p {
            color: #666;
            font-size: 0.8rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
            padding-bottom: 12px;
        }

        .energy-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 5px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.05);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        .badge {
            background: rgba(255, 107, 107, 0.1);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
            font-weight: 600;
        }

        .megawatt-value {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            line-height: 1;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
            margin: 5px 0 4px;
            letter-spacing: 4px;
        }

        .mw-label {
            text-align: center;
            color: #ff6b6b;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0 5px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ff8787);
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .tap-button {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff5252);
            border: none;
            margin: 20px auto 25px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 12px 0 #c0392b, 0 20px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.05s linear;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 3px solid #ffb8b8;
            position: relative;
            z-index: 5;
        }

        .tap-button:active {
            transform: translateY(8px);
        }

        .tap-button.disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
            background: radial-gradient(circle at 30% 30%, #aaa, #888);
            box-shadow: 0 12px 0 #666;
        }

        .victory-message {
            text-align: center;
            color: #ff6b6b;
            font-size: 1.3rem;
            font-weight: 800;
            margin: 10px 0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 50px;
            padding: 12px 16px;
            margin: 20px 0 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .user-id-label {
            color: #ff6b6b;
            font-weight: 600;
        }

        .user-id-value {
            color: #ff6b6b;
            background: white;
            padding: 5px 10px;
            border-radius: 30px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 107, 107, 0.3);
            font-weight: 500;
        }

        .status-message {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 10px 14px;
            margin-top: 5px;
            text-align: center;
            font-size: 0.9rem;
            border-left: 4px solid #ff6b6b;
            color: #333;
        }

        .status-message.victory {
            border-left-color: #ffd700;
            background: #fff9e6;
            color: #ff6b6b;
            font-weight: 600;
        }

        footer {
            text-align: center;
            color: #999;
            font-size: 0.65rem;
            margin-top: 18px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border: 2px solid #ff6b6b;
            border-radius: 48px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            color: #ff6b6b;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .name-input {
            width: 100%;
            padding: 12px 16px;
            background: #f8f9fa;
            border: 2px solid #ff6b6b;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .name-input:focus {
            border-color: #ff5252;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
        }

        .save-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #ff6b6b;
        }

        .save-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        @media (max-width: 400px) {
            .tap-button {
                width: 180px;
                height: 180px;
                font-size: 2rem;
                margin: 15px auto 20px auto;
            }
            .megawatt-value {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="animation-container" id="animationContainer"></div>

    <div class="modal active" id="nameModal">
        <div class="modal-content">
            <h2>✨ ДОБРО ПОЖАЛОВАТЬ!</h2>
            <p>Введите ваше имя для участия</p>
            <input type="text" class="name-input" id="userNameInput" placeholder="Ваше имя" maxlength="20">
            <button class="save-btn" onclick="saveUserName()">НАЧАТЬ</button>
        </div>
    </div>

    <div class="game-container">
        <div class="logo-container">
            <h2>🏕️ ШКОЛА ВОЖАТЫХ</h2>
            <p>Тапай, чтобы наполнить отряд энергией!</p>
        </div>
        
        <h1>✨ ТАПАЙ</h1>
        <div class="subtitle">Каждый тап = 1 единица энергии</div>
        
        <div class="energy-card">
            <div class="stats-row">
                <span class="badge">✨ накоплено</span>
            </div>
            <div class="megawatt-value" id="counter">0</div>
            <div class="mw-label">ЕДИНИЦ ЭНЕРГИИ</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        
        <button class="tap-button" id="tapBtn" style="display: none;">ТАП</button>
        
        <div class="victory-message" id="victoryMessage" style="display: none;">
            🎉 ПОБЕДА! Цель достигнута! 🎉
        </div>
        
        <div class="user-info" style="display: none;" id="userInfo">
            <span class="user-id-label">👤 УЧАСТНИК</span>
            <span class="user-id-value" id="userNameDisplay">загрузка...</span>
        </div>
        
        <div class="status-message" id="statusMessage" style="display: none;">
            👆 Тапай, чтобы накопить энергию!
        </div>
        
        <footer style="display: none;" id="footer">
            * результаты сохраняются в облаке
        </footer>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxkqRPD0Sg7FYfrXI8TZY_dqnV-ms6zXhzfrT2-wfDyRiPPNmCuNYoKYG4hvPKwvjX7/exec';
        const SAVE_INTERVAL = 20;
        const MAX_ENERGY = 100;
        
        let userName = '';
        let userId = '';
        let isGameActive = true;
        
        function createTapAnimation() {
            const container = document.getElementById('animationContainer');
            const button = document.getElementById('tapBtn');
            const buttonRect = button.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            const centerX = buttonRect.left + buttonRect.width / 2 - containerRect.left;
            const centerY = buttonRect.top + buttonRect.height / 2 - containerRect.top;
            
            // 5 звёздочек в случайных местах вокруг кнопки (как молнии в Россетях)
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = '✨';
                
                const randomAngle = Math.random() * Math.PI * 2;
                const randomRadius = 80 + Math.random() * 100;
                
                const starX = centerX + Math.cos(randomAngle) * randomRadius;
                const starY = centerY + Math.sin(randomAngle) * randomRadius;
                
                star.style.left = starX + 'px';
                star.style.top = starY + 'px';
                
                const size = 1.5 + Math.random() * 2;
                star.style.fontSize = size + 'rem';
                
                container.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
        }
        
        function updateProgress(currentValue) {
            const percent = Math.min(100, (currentValue / MAX_ENERGY) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            
            if (currentValue >= MAX_ENERGY) {
                isGameActive = false;
                document.getElementById('tapBtn').classList.add('disabled');
                document.getElementById('victoryMessage').style.display = 'block';
                document.getElementById('statusMessage').classList.add('victory');
                document.getElementById('statusMessage').innerHTML = '🎉 ПОБЕДА! Цель достигнута! 🎉';
            } else {
                isGameActive = true;
                document.getElementById('tapBtn').classList.remove('disabled');
                document.getElementById('victoryMessage').style.display = 'none';
                document.getElementById('statusMessage').classList.remove('victory');
            }
        }
        
        function saveUserName() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) { alert('Введите имя'); return; }
            
            userName = name;
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            
            document.getElementById('nameModal').classList.remove('active');
            document.getElementById('tapBtn').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('statusMessage').style.display = 'block';
            document.getElementById('footer').style.display = 'block';
            
            document.getElementById('userNameDisplay').textContent = userName;
            
            window.counter = 0;
            window.lastSavedCounter = 0;
            document.getElementById('counter').innerText = '0';
            updateProgress(0);
        }
        
        window.counter = 0;
        window.lastSavedCounter = 0;
        
        async function sendTapsToServer(tapsValue) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.innerText = '⏳ Отправка...';
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        userName: userName || 'Аноним',
                        taps: tapsValue
                    })
                });
                
                window.lastSavedCounter = tapsValue;
                statusEl.innerText = '✅ Сохранено! ' + tapsValue + ' ед.';
            } catch(e) {
                statusEl.innerText = '❌ Ошибка';
            }
        }
        
        function handleTap() {
            if (!userName || !isGameActive) return;
            
            createTapAnimation();
            
            if (window.counter + 1 > MAX_ENERGY) {
                window.counter = MAX_ENERGY;
                document.getElementById('counter').innerText = window.counter;
                updateProgress(window.counter);
                return;
            }
            
            window.counter++;
            document.getElementById('counter').innerText = window.counter;
            updateProgress(window.counter);
            
            // Анимация счётчика
            const counterEl = document.getElementById('counter');
            counterEl.classList.add('counter-pop');
            setTimeout(() => counterEl.classList.remove('counter-pop'), 200);
            
            // Анимация кнопки
            const btn = document.getElementById('tapBtn');
            btn.classList.add('button-press');
            btn.classList.add('button-pulse');
            
            setTimeout(() => {
                btn.classList.remove('button-press');
                btn.classList.remove('button-pulse');
            }, 300);
            
            if (navigator.vibrate) navigator.vibrate(20);
            
            if (window.counter % SAVE_INTERVAL === 0) {
                sendTapsToServer(window.counter);
            } else {
                document.getElementById('statusMessage').innerText = `✨ +1! Всего: ${window.counter}`;
            }
        }

        document.getElementById('tapBtn').addEventListener('click', handleTap);
        document.getElementById('tapBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });
    </script>
</body>
</html>
