<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа вожатых | Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .logo-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-header h1 {
            color: #ff6b6b;
            font-size: 2rem;
        }

        .logo-header p {
            color: #666;
            margin-top: 8px;
        }

        .polyhedron-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        canvas {
            background: #f8f9fa;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            height: auto;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid #e9ecef;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff6b6b;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .faces-info {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .faces-info h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .face-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .face-badge {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .face-badge.lit {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .refresh-btn, .reset-btn {
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .refresh-btn {
            background: #ff6b6b;
            color: white;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
        }

        .update-time {
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <h1>🏕️ ШКОЛА ВОЖАТЫХ</h1>
            <p>Многогранник отрядной энергии</p>
        </div>

        <div class="polyhedron-container">
            <canvas id="polyhedronCanvas" width="500" height="500" style="width: 100%; height: auto; max-width: 500px; aspect-ratio: 1/1;"></canvas>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="totalEnergy">0</div>
                <div class="stat-label">Всего энергии</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPlayers">0</div>
                <div class="stat-label">Участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeFaces">0</div>
                <div class="stat-label">Закрашено граней</div>
            </div>
        </div>

        <div class="faces-info">
            <h3>✨ Закрашивание граней</h3>
            <div class="face-list" id="faceList"></div>
        </div>

        <div class="footer">
            <div class="update-time" id="updateTime">Обновление...</div>
            <div style="display: flex; gap: 10px;">
                <button class="refresh-btn" onclick="loadData()">🔄 ОБНОВИТЬ</button>
                <button class="reset-btn" onclick="resetData()">🗑️ СБРОСИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        // ⚡ ВСТАВЬТЕ ВАШУ ССЫЛКУ НА СКРИПТ
        const API_URL = 'https://script.google.com/macros/s/AKfycbxkqRPD0Sg7FYfrXI8TZY_dqnV-ms6zXhzfrT2-wfDyRiPPNmCuNYoKYG4hvPKwvjX7/exec';
        const MAX_ENERGY = 10000;
        const FACES_COUNT = 12;

        function getEnergyThreshold(faceIndex) {
            return Math.ceil((faceIndex + 1) / FACES_COUNT * MAX_ENERGY);
        }

        function getLitFaces(energy) {
            const lit = [];
            for (let i = 0; i < FACES_COUNT; i++) {
                if (energy >= getEnergyThreshold(i)) {
                    lit.push(i);
                }
            }
            return lit;
        }

        function drawPolyhedron(energy) {
            const canvas = document.getElementById('polyhedronCanvas');
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.35;
            
            ctx.clearRect(0, 0, size, size);
            
            const litFaces = getLitFaces(energy);
            const angles = [];
            for (let i = 0; i < FACES_COUNT; i++) {
                angles.push((i * 360 / FACES_COUNT) * Math.PI / 180);
            }
            
            for (let i = 0; i < FACES_COUNT; i++) {
                const angle = angles[i];
                const isLit = litFaces.includes(i);
                
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                ctx.beginPath();
                const faceRadius = size * 0.08;
                for (let j = 0; j < 6; j++) {
                    const faceAngle = j * 60 * Math.PI / 180 + angle;
                    const px = x + Math.cos(faceAngle) * faceRadius;
                    const py = y + Math.sin(faceAngle) * faceRadius;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                
                if (isLit) {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ff6b6b';
                } else {
                    ctx.fillStyle = '#e9ecef';
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                ctx.strokeStyle = '#dee2e6';
                ctx.stroke();
                
                ctx.fillStyle = isLit ? 'white' : '#adb5bd';
                ctx.font = `bold ${size * 0.035}px Inter`;
                ctx.shadowBlur = 0;
                ctx.fillText(i + 1, x - 10, y + 8);
            }
            
            // Центральный круг
            ctx.beginPath();
            ctx.arc(centerX, centerY, size * 0.12, 0, 2 * Math.PI);
            ctx.fillStyle = '#f8f9fa';
            ctx.fill();
            ctx.fillStyle = '#ff6b6b';
            ctx.font = `bold ${size * 0.07}px Inter`;
            ctx.fillText('✨', centerX - 20, centerY + 12);
            
            // Процент
            const percent = Math.min(100, Math.round((energy / MAX_ENERGY) * 100));
            ctx.fillStyle = '#333';
            ctx.font = `bold ${size * 0.04}px Inter`;
            ctx.fillText(`${percent}%`, centerX - 22, centerY + 55);
        }

        function updateFaceList(energy) {
            const litFaces = getLitFaces(energy);
            const container = document.getElementById('faceList');
            
            let html = '';
            for (let i = 0; i < FACES_COUNT; i++) {
                const isLit = litFaces.includes(i);
                const threshold = getEnergyThreshold(i);
                html += `
                    <div class="face-badge ${isLit ? 'lit' : ''}">
                        Грань ${i + 1} ${isLit ? '✓' : `(${threshold})`}
                    </div>
                `;
            }
            container.innerHTML = html;
            document.getElementById('activeFaces').textContent = litFaces.length;
        }

        async function loadData() {
            try {
                const response = await fetch(API_URL + '?t=' + Date.now());
                const data = await response.json();
                
                if (data.success && data.data) {
                    const totalEnergy = data.data.reduce((sum, p) => sum + (p.taps || 0), 0);
                    
                    document.getElementById('totalEnergy').textContent = totalEnergy;
                    document.getElementById('totalPlayers').textContent = data.data.length;
                    
                    drawPolyhedron(totalEnergy);
                    updateFaceList(totalEnergy);
                    document.getElementById('updateTime').innerHTML = `🕐 Обновлено: ${new Date().toLocaleTimeString()}`;
                } else {
                    drawPolyhedron(0);
                    updateFaceList(0);
                }
            } catch(error) {
                console.error('Ошибка:', error);
                drawPolyhedron(0);
                updateFaceList(0);
            }
        }

        async function resetData() {
            if (!confirm('⚠️ Удалить все данные? Продолжить?')) return;
            
            try {
                const response = await fetch(API_URL + '?reset=1&t=' + Date.now());
                const data = await response.json();
                if (data.success) {
                    alert('✅ Данные очищены');
                    loadData();
                } else {
                    alert('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch(error) {
                alert('❌ Ошибка соединения');
            }
        }

        // Загружаем сразу и каждые 10 секунд
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
