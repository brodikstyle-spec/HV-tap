<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РОССЕТИ | ЭНЕРГОТАП ПАНЕЛЬ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border: 1px solid rgba(0, 90, 157, 0.2);
            border-radius: 48px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 90, 157, 0.2);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 90, 157, 0.1);
        }

        .logo-container img {
            max-width: 250px;
            height: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 90, 157, 0.1);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #005a9d;
        }

        .title i {
            font-size: 2.5rem;
            color: #005a9d;
        }

        .stats-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #f0f5fa, #e6ecf3);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(0, 90, 157, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 2rem;
            color: #005a9d;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #005a9d;
            line-height: 1.2;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #005a9d;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }

        .podium-card {
            background: linear-gradient(180deg, #f0f5fa, #e6ecf3);
            border-radius: 30px 30px 20px 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(0, 90, 157, 0.2);
            box-shadow: 0 20px 30px -10px rgba(0, 90, 157, 0.2);
            position: relative;
            min-width: 200px;
        }

        .podium-1 {
            transform: scale(1.1);
            background: linear-gradient(180deg, #005a9d, #003d6b);
            border-color: #005a9d;
            box-shadow: 0 0 30px rgba(0, 90, 157, 0.3);
            order: 2;
        }

        .podium-2 { order: 1; }
        .podium-3 { order: 3; }

        .crown {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px gold);
        }

        .podium-rank {
            font-size: 2rem;
            font-weight: 900;
            color: #005a9d;
            margin-bottom: 10px;
        }

        .podium-1 .podium-rank,
        .podium-1 .podium-name,
        .podium-1 .podium-score {
            color: white;
        }

        .podium-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .podium-score {
            font-size: 1.8rem;
            font-weight: 800;
            color: #005a9d;
        }

        .podium-score small {
            font-size: 0.9rem;
            color: #666;
        }

        .table-container {
            background: #f8f8f8;
            border-radius: 30px;
            border: 1px solid rgba(0, 90, 157, 0.1);
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            background: linear-gradient(135deg, #f0f5fa, #e6ecf3);
            padding: 20px;
            color: #005a9d;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(0, 90, 157, 0.2);
        }

        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 90, 157, 0.1);
            transition: all 0.2s ease;
            color: #333;
            align-items: center;
            background: white;
        }

        .table-row:hover {
            background: rgba(0, 90, 157, 0.02);
        }

        .rank {
            font-weight: 800;
            font-size: 1.2rem;
        }

        .rank-1 { color: #005a9d; }
        .rank-2 { color: #005a9d; }
        .rank-3 { color: #005a9d; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #005a9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            font-size: 1.2rem;
        }

        .username {
            font-weight: 600;
            word-break: break-all;
            color: #333;
        }

        .score {
            font-weight: 800;
            font-size: 1.3rem;
            color: #005a9d;
        }

        .trend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1rem;
            color: #005a9d;
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
            flex-wrap: wrap;
            gap: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .refresh-btn, .reset-btn, .start-btn {
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .refresh-btn {
            background: #005a9d;
            color: white;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
        }

        .start-btn {
            background: #2ecc71;
            color: white;
        }

        .start-btn.disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .refresh-btn:hover:not(:disabled), .reset-btn:hover, .start-btn:hover:not(.disabled) {
            transform: scale(1.05);
        }

        .update-time {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        @media (max-width: 700px) {
            .container { padding: 20px; }
            .title h1 { font-size: 1.8rem; }
            .table-header { 
                grid-template-columns: 50px 1fr 100px 50px;
                font-size: 0.9rem;
                padding: 15px;
            }
            .table-row {
                grid-template-columns: 50px 1fr 100px 50px;
                padding: 12px 15px;
            }
            .footer {
                flex-direction: column;
                align-items: stretch;
            }
            .button-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="log_PNG.png" alt="Россети Московский регион">
        </div>

        <div class="header">
            <div class="title">
                <i class="fas fa-bolt"></i>
                <h1>ЭНЕРГОТАП ПАНЕЛЬ</h1>
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <i class="fas fa-users stat-icon"></i>
                    <div class="stat-info">
                        <span class="stat-label">Участников</span>
                        <span class="stat-value" id="totalPlayers">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-bolt stat-icon"></i>
                    <div class="stat-info">
                        <span class="stat-label">Всего МВт</span>
                        <span class="stat-value" id="totalMW">0</span>
                    </div>
                </div>
                <div class="live-badge">
                    <i class="fas fa-circle"></i> LIVE
                </div>
            </div>
        </div>

        <!-- Подиум с топ-3 -->
        <div class="podium" id="podium"></div>

        <!-- Таблица лидеров -->
        <div class="table-container">
            <div class="table-header">
                <div>МЕСТО</div>
                <div>УЧАСТНИК</div>
                <div>МЕГАВАТТ</div>
                <div>⚡</div>
            </div>
            <div id="leaderboardRows"></div>
        </div>

        <div class="footer">
            <div class="update-time" id="updateTime">
                <i class="far fa-clock"></i> Обновление...
            </div>
            <div class="button-group">
                <button class="start-btn" id="startBtn" onclick="startGame()">
                    <i class="fas fa-play"></i> СТАРТ
                </button>
                <button class="refresh-btn" onclick="loadLeaderboard()">
                    <i class="fas fa-sync-alt"></i> ОБНОВИТЬ
                </button>
                <button class="reset-btn" onclick="resetData()">
                    <i class="fas fa-trash"></i> СБРОСИТЬ ВСЁ
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/library/d/1-6tE4D9gX7eliZQM24-V_4hb3I0BvIpv9BNcW0WsLf4tsqGVMi4sdlg6/5';

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        function getPlayerName(player) {
            return player.userName || player.userId || 'Аноним';
        }

        async function startGame() {
            const startBtn = document.getElementById('startBtn');
            startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ЗАПУСК...';
            startBtn.disabled = true;
            
            try {
                const response = await fetch(API_URL + '?start=1&t=' + Date.now());
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Игра запущена! Участники могут начинать тапать!');
                    startBtn.innerHTML = '<i class="fas fa-check"></i> ИДЁТ ИГРА';
                    startBtn.classList.add('disabled');
                    startBtn.disabled = true;
                    loadLeaderboard();
                } else {
                    alert('❌ Ошибка: ' + (data.error || 'Не удалось запустить игру'));
                    startBtn.innerHTML = '<i class="fas fa-play"></i> СТАРТ';
                    startBtn.disabled = false;
                }
            } catch(error) {
                alert('❌ Ошибка соединения');
                startBtn.innerHTML = '<i class="fas fa-play"></i> СТАРТ';
                startBtn.disabled = false;
            }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(API_URL + '?t=' + Date.now());
                const data = await response.json();
                
                if (data.success && data.data) {
                    const players = data.data;
                    const totalPlayers = players.length;
                    const totalMW = players.reduce((sum, p) => sum + (p.taps || 0), 0);
                    
                    document.getElementById('totalPlayers').textContent = totalPlayers;
                    document.getElementById('totalMW').textContent = formatNumber(totalMW);
                    
                    // Подиум
                    let podiumHtml = '';
                    
                    if (players.length > 1) {
                        podiumHtml += `
                            <div class="podium-card podium-2">
                                <div class="podium-rank">2</div>
                                <div class="podium-name">${getPlayerName(players[1])}</div>
                                <div class="podium-score">${formatNumber(players[1]?.taps || 0)} <small>МВт</small></div>
                            </div>
                        `;
                    } else {
                        podiumHtml += `
                            <div class="podium-card podium-2">
                                <div class="podium-rank">2</div>
                                <div class="podium-name">—</div>
                                <div class="podium-score">0 <small>МВт</small></div>
                            </div>
                        `;
                    }
                    
                    if (players.length > 0) {
                        podiumHtml += `
                            <div class="podium-card podium-1">
                                <div class="crown">👑</div>
                                <div class="podium-rank">1</div>
                                <div class="podium-name">${getPlayerName(players[0])}</div>
                                <div class="podium-score">${formatNumber(players[0]?.taps || 0)} <small>МВт</small></div>
                            </div>
                        `;
                    } else {
                        podiumHtml += `
                            <div class="podium-card podium-1">
                                <div class="podium-rank">1</div>
                                <div class="podium-name">—</div>
                                <div class="podium-score">0 <small>МВт</small></div>
                            </div>
                        `;
                    }
                    
                    if (players.length > 2) {
                        podiumHtml += `
                            <div class="podium-card podium-3">
                                <div class="podium-rank">3</div>
                                <div class="podium-name">${getPlayerName(players[2])}</div>
                                <div class="podium-score">${formatNumber(players[2]?.taps || 0)} <small>МВт</small></div>
                            </div>
                        `;
                    } else {
                        podiumHtml += `
                            <div class="podium-card podium-3">
                                <div class="podium-rank">3</div>
                                <div class="podium-name">—</div>
                                <div class="podium-score">0 <small>МВт</small></div>
                            </div>
                        `;
                    }
                    
                    document.getElementById('podium').innerHTML = podiumHtml;
                    
                    // Таблица (остальные участники)
                    const otherPlayers = players.slice(3);
                    const rowsHtml = otherPlayers.map((player, index) => {
                        const rank = index + 4;
                        const avatarSymbol = getPlayerName(player).charAt(0).toUpperCase() || '⚡';
                        
                        return `
                            <div class="table-row">
                                <div class="rank">${rank}</div>
                                <div class="user-info">
                                    <div class="avatar">${avatarSymbol}</div>
                                    <span class="username">${getPlayerName(player)}</span>
                                </div>
                                <div class="score">${formatNumber(player.taps || 0)}</div>
                                <div class="trend">⚡</div>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('leaderboardRows').innerHTML = rowsHtml || '<div class="empty-state"><i class="fas fa-bolt"></i><br>Нет данных</div>';
                    document.getElementById('updateTime').innerHTML = `<i class="far fa-clock"></i> Обновлено: ${new Date().toLocaleTimeString()}`;
                }
            } catch(error) {
                console.error('Ошибка:', error);
                document.getElementById('leaderboardRows').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ff6b6b"></i><br>
                        Ошибка загрузки
                    </div>
                `;
            }
        }

        async function resetData() {
            if (!confirm('⚠️ Удалить все данные и остановить игру? Продолжить?')) return;
            
            const statusEl = document.getElementById('updateTime');
            const originalText = statusEl.innerHTML;
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Очистка...';
            
            try {
                const response = await fetch(API_URL + '?reset=1&t=' + Date.now());
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Данные очищены, игра остановлена');
                    // Сбрасываем кнопку старта
                    const startBtn = document.getElementById('startBtn');
                    startBtn.innerHTML = '<i class="fas fa-play"></i> СТАРТ';
                    startBtn.classList.remove('disabled');
                    startBtn.disabled = false;
                    loadLeaderboard();
                } else {
                    alert('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                    statusEl.innerHTML = originalText;
                }
            } catch(error) {
                alert('❌ Ошибка соединения');
                statusEl.innerHTML = originalText;
            }
        }

        loadLeaderboard();
        setInterval(loadLeaderboard, 5000);
    </script>
</body>
</html>
