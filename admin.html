<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа вожатых | Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
        }
        .logo-header h1 { color: #ff6b6b; font-size: 2rem; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 10px;
        }
        .tab {
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            background: #f8f9fa;
            color: #666;
            border: 1px solid transparent;
        }
        .tab.active { background: #ff6b6b; color: white; }
        .tab-content { display: none; min-height: 500px; }
        .tab-content.active { display: block; }
        .polyhedron-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: #f8f9fa;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            flex: 1;
            border: 1px solid #e9ecef;
        }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: #ff6b6b; }
        .stat-label { color: #666; font-size: 0.9rem; margin-top: 8px; }
        .faces-info {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }
        .face-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .face-badge {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.85rem;
        }
        .face-badge.lit {
            background: #ff6b6b;
            color: white;
        }
        .table-container {
            background: #f8f8f8;
            border-radius: 30px;
            border: 1px solid #e9ecef;
            overflow: hidden;
        }
        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            background: #e9ecef;
            padding: 20px;
            color: #ff6b6b;
            font-weight: 700;
        }
        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            background: white;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }
        .podium-card {
            background: #f8f9fa;
            border-radius: 30px 30px 20px 20px;
            padding: 25px;
            text-align: center;
            min-width: 180px;
            position: relative;
        }
        .podium-1 {
            transform: scale(1.1);
            background: #ff6b6b;
            color: white;
        }
        .crown {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
        }
        .podium-1 .podium-rank,
        .podium-1 .podium-name,
        .podium-1 .podium-score { color: white; }
        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .refresh-btn, .reset-btn {
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }
        .refresh-btn { background: #ff6b6b; color: white; }
        .reset-btn { background: #dc3545; color: white; }
        .update-time { color: #666; font-size: 0.9rem; }
        @media (max-width: 700px) {
            .table-header, .table-row { grid-template-columns: 50px 1fr 100px 50px; font-size: 0.8rem; }
            .podium-card { min-width: 130px; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <h1>🏕️ ШКОЛА ВОЖАТЫХ</h1>
            <p>Многогранник отрядной энергии</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('polyhedron')">🎨 Многогранник</div>
            <div class="tab" onclick="switchTab('results')">🏆 Результаты</div>
        </div>

        <div id="polyhedronTab" class="tab-content active">
            <div class="polyhedron-container">
                <canvas id="polyhedronCanvas" width="600" height="587" style="width: 100%; height: auto; max-width: 600px; aspect-ratio: 600/587;"></canvas>
            </div>
            <div class="stats-panel">
                <div class="stat-card"><div class="stat-value" id="totalEnergy">0</div><div class="stat-label">Всего энергии</div></div>
                <div class="stat-card"><div class="stat-value" id="totalPlayers">0</div><div class="stat-label">Участников</div></div>
                <div class="stat-card"><div class="stat-value" id="activeFaces">0</div><div class="stat-label">Закрашено граней</div></div>
            </div>
            <div class="faces-info">
                <h3>✨ Закрашивание граней</h3>
                <div class="face-list" id="faceList"></div>
            </div>
        </div>

        <div id="resultsTab" class="tab-content">
            <div class="podium" id="podium"></div>
            <div class="table-container">
                <div class="table-header"><div>МЕСТО</div><div>УЧАСТНИК</div><div>ЭНЕРГИЯ</div><div>✨</div></div>
                <div id="leaderboardRows"></div>
            </div>
        </div>

        <div class="footer">
            <div class="update-time" id="updateTime">Обновление...</div>
            <div><button class="refresh-btn" onclick="loadData()">🔄 ОБНОВИТЬ</button>
            <button class="reset-btn" onclick="resetData()">🗑️ СБРОСИТЬ</button></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxkqRPD0Sg7FYfrXI8TZY_dqnV-ms6zXhzfrT2-wfDyRiPPNmCuNYoKYG4hvPKwvjX7/exec';
        const MAX_ENERGY = 100;   // 🔥 ИЗМЕНЕНО ДЛЯ ТЕСТА: порог 100 единиц
        const FACES_COUNT = 6;
        let currentData = null;
        let polyhedronImage = new Image();
        let imageLoaded = false;
        
        // Координаты граней (внешние грани)
        const FACE_PATHS = [
            [[300, 0], [450, 87], [375, 174], [225, 174], [150, 87]],
            [[450, 87], [600, 293], [525, 380], [375, 174]],
            [[600, 293], [450, 587], [300, 500], [525, 380]],
            [[450, 587], [150, 587], [225, 500], [375, 500]],
            [[150, 587], [0, 293], [75, 380], [225, 500]],
            [[0, 293], [150, 87], [225, 174], [75, 380]]
        ];

        // Координаты центрального отверстия (шестиугольник)
        const HOLE_PATH = [
            [225, 174], [375, 174], [450, 293], [375, 413], [225, 413], [150, 293]
        ];

        polyhedronImage.src = 'polyhedron.png';
        polyhedronImage.onload = () => { imageLoaded = true; if (currentData) updatePolyhedronTab(currentData); };

        function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function getPlayerName(p) { return p.userName || p.userId || 'Аноним'; }

        // Пороги для 6 граней при MAX_ENERGY = 100:
        // Грань 1: 17, Грань 2: 34, Грань 3: 50, Грань 4: 67, Грань 5: 84, Грань 6: 100
        function getEnergyThreshold(i) { return Math.ceil((i + 1) / FACES_COUNT * MAX_ENERGY); }
        function getLitFaces(energy) { let lit = []; for (let i=0; i<FACES_COUNT; i++) if (energy >= getEnergyThreshold(i)) lit.push(i); return lit; }

        function drawPolyhedron(energy) {
            const canvas = document.getElementById('polyhedronCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            if (imageLoaded && polyhedronImage.complete) {
                ctx.drawImage(polyhedronImage, 0, 0, w, h);
            } else {
                ctx.fillStyle = '#e9ecef';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#adb5bd';
                ctx.font = '16px Inter';
                ctx.fillText('Загрузка картинки...', w/2-70, h/2);
                return;
            }
            
            const litFaces = getLitFaces(energy);
            
            // Рисуем полупрозрачную заливку на внешних гранях
            ctx.save();
            ctx.globalAlpha = 0.65;
            for (let i = 0; i < FACES_COUNT; i++) {
                if (litFaces.includes(i)) {
                    ctx.beginPath();
                    const points = FACE_PATHS[i];
                    ctx.moveTo(points[0][0], points[0][1]);
                    for (let j = 1; j < points.length; j++) ctx.lineTo(points[j][0], points[j][1]);
                    ctx.closePath();
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fill();
                }
            }
            ctx.restore();
            
            // Вырезаем центральное отверстие
            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.moveTo(HOLE_PATH[0][0], HOLE_PATH[0][1]);
            for (let i = 1; i < HOLE_PATH.length; i++) ctx.lineTo(HOLE_PATH[i][0], HOLE_PATH[i][1]);
            ctx.closePath();
            ctx.fillStyle = 'rgba(0,0,0,1)';
            ctx.fill();
            ctx.restore();
            
            // Обводка граней
            ctx.strokeStyle = '#dee2e6';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < FACES_COUNT; i++) {
                ctx.beginPath();
                const points = FACE_PATHS[i];
                ctx.moveTo(points[0][0], points[0][1]);
                for (let j = 1; j < points.length; j++) ctx.lineTo(points[j][0], points[j][1]);
                ctx.closePath();
                ctx.stroke();
            }
            
            // Обводка отверстия
            ctx.beginPath();
            ctx.moveTo(HOLE_PATH[0][0], HOLE_PATH[0][1]);
            for (let i = 1; i < HOLE_PATH.length; i++) ctx.lineTo(HOLE_PATH[i][0], HOLE_PATH[i][1]);
            ctx.closePath();
            ctx.stroke();
        }

        function updateFaceList(energy) {
            const lit = getLitFaces(energy);
            let html = '';
            for (let i = 0; i < FACES_COUNT; i++) {
                const isLit = lit.includes(i);
                const threshold = getEnergyThreshold(i);
                html += `<div class="face-badge ${isLit ? 'lit' : ''}">Грань ${i+1} ${isLit ? '✓' : `(${threshold})`}</div>`;
            }
            document.getElementById('faceList').innerHTML = html;
            document.getElementById('activeFaces').textContent = lit.length;
        }

        function updatePolyhedronTab(players) {
            const totalEnergy = players.reduce((s,p) => s + (p.taps||0), 0);
            document.getElementById('totalEnergy').textContent = totalEnergy;
            document.getElementById('totalPlayers').textContent = players.length;
            drawPolyhedron(totalEnergy);
            updateFaceList(totalEnergy);
        }

        function displayResults(players) {
            document.getElementById('totalPlayers').textContent = players.length;
            document.getElementById('totalEnergy').textContent = players.reduce((s,p)=>s+(p.taps||0),0);
            let podiumHtml = '';
            if (players.length > 1) podiumHtml += `<div class="podium-card podium-2"><div class="podium-rank">2</div><div class="podium-name">${getPlayerName(players[1])}</div><div class="podium-score">${players[1]?.taps||0} ед.</div></div>`;
            else podiumHtml += `<div class="podium-card podium-2"><div class="podium-rank">2</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            if (players.length > 0) podiumHtml += `<div class="podium-card podium-1"><div class="crown">👑</div><div class="podium-rank">1</div><div class="podium-name">${getPlayerName(players[0])}</div><div class="podium-score">${players[0]?.taps||0} ед.</div></div>`;
            else podiumHtml += `<div class="podium-card podium-1"><div class="podium-rank">1</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            if (players.length > 2) podiumHtml += `<div class="podium-card podium-3"><div class="podium-rank">3</div><div class="podium-name">${getPlayerName(players[2])}</div><div class="podium-score">${players[2]?.taps||0} ед.</div></div>`;
            else podiumHtml += `<div class="podium-card podium-3"><div class="podium-rank">3</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            document.getElementById('podium').innerHTML = podiumHtml;
            const rowsHtml = players.slice(3).map((p, idx) => `<div class="table-row"><div class="rank">${idx+4}</div><div class="user-info"><div class="avatar" style="background:#ff6b6b;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;">${getPlayerName(p).charAt(0).toUpperCase()||'✨'}</div><span class="username">${getPlayerName(p)}</span></div><div class="score">${p.taps||0}</div><div class="trend">✨</div></div>`).join('');
            document.getElementById('leaderboardRows').innerHTML = rowsHtml || '<div class="empty-state"><i class="fas fa-star"></i><br>Нет данных</div>';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'polyhedron') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('polyhedronTab').classList.add('active');
                if (currentData) updatePolyhedronTab(currentData);
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('resultsTab').classList.add('active');
                if (currentData) displayResults(currentData);
            }
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data.success && data.data) {
                    currentData = data.data;
                    if (document.getElementById('polyhedronTab').classList.contains('active')) updatePolyhedronTab(currentData);
                    else displayResults(currentData);
                    document.getElementById('updateTime').innerHTML = `🕐 Обновлено: ${new Date().toLocaleTimeString()}`;
                } else { if (document.getElementById('polyhedronTab').classList.contains('active')) updatePolyhedronTab([]); else displayResults([]); }
            } catch(e) { console.error(e); }
        }

        async function resetData() {
            if (!confirm('Удалить все данные?')) return;
            const status = document.getElementById('updateTime');
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Очистка...';
            try {
                const res = await fetch(API_URL + '?reset=1&t=' + Date.now());
                const data = await res.json();
                if (data.success) { alert('✅ Данные очищены'); loadData(); }
                else { alert('❌ Ошибка'); status.innerHTML = 'Обновление...'; }
            } catch(e) { alert('❌ Ошибка соединения'); status.innerHTML = 'Обновление...'; }
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
