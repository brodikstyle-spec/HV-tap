<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа вожатых | Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
        }
        .logo-header h1 {
            color: #ff6b6b;
            font-size: 2rem;
        }
        .logo-header p {
            color: #666;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 10px;
        }
        .tab {
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
            color: #666;
            border: 1px solid transparent;
        }
        .tab.active {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .tab-content {
            display: none;
            min-height: 500px;
        }
        .tab-content.active {
            display: block;
        }
        .polyhedron-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        canvas {
            background: #f8f9fa;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            height: auto;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid #e9ecef;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff6b6b;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .faces-info {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }
        .faces-info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .face-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .face-badge {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .face-badge.lit {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .table-container {
            background: #f8f8f8;
            border-radius: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            color: #ff6b6b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }
        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 80px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            color: #333;
            align-items: center;
            background: white;
        }
        .table-row:hover {
            background: rgba(255, 107, 107, 0.05);
        }
        .rank {
            font-weight: 800;
            font-size: 1.2rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #ff6b6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            font-size: 1.2rem;
        }
        .username {
            font-weight: 600;
            word-break: break-all;
        }
        .score {
            font-weight: 800;
            font-size: 1.3rem;
            color: #ff6b6b;
        }
        .trend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1rem;
            color: #ff6b6b;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }
        .podium-card {
            background: linear-gradient(180deg, #f8f9fa, #e9ecef);
            border-radius: 30px 30px 20px 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            position: relative;
            min-width: 180px;
        }
        .podium-1 {
            transform: scale(1.1);
            background: linear-gradient(180deg, #ff6b6b, #ff5252);
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            order: 2;
        }
        .podium-2 { order: 1; }
        .podium-3 { order: 3; }
        .crown {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px gold);
        }
        .podium-rank {
            font-size: 2rem;
            font-weight: 900;
            color: #ff6b6b;
            margin-bottom: 10px;
        }
        .podium-1 .podium-rank,
        .podium-1 .podium-name,
        .podium-1 .podium-score {
            color: white;
        }
        .podium-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .podium-score {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff6b6b;
        }
        .podium-score small {
            font-size: 0.8rem;
            color: #666;
        }
        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .refresh-btn, .reset-btn {
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .refresh-btn {
            background: #ff6b6b;
            color: white;
        }
        .reset-btn {
            background: #dc3545;
            color: white;
        }
        .update-time {
            color: #666;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        @media (max-width: 700px) {
            .container { padding: 20px; }
            .table-header { grid-template-columns: 50px 1fr 100px 50px; font-size: 0.8rem; padding: 15px; }
            .table-row { grid-template-columns: 50px 1fr 100px 50px; padding: 12px 15px; font-size: 0.9rem; }
            .podium-card { min-width: 130px; padding: 15px; }
            .podium-name { font-size: 0.9rem; }
            .podium-score { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <h1>🏕️ ШКОЛА ВОЖАТЫХ</h1>
            <p>Многогранник отрядной энергии</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('polyhedron')">
                <i class="fas fa-cube"></i> Многогранник
            </div>
            <div class="tab" onclick="switchTab('results')">
                <i class="fas fa-trophy"></i> Результаты
            </div>
        </div>

        <div id="polyhedronTab" class="tab-content active">
            <div class="polyhedron-container">
                <canvas id="polyhedronCanvas" width="500" height="500" style="width: 100%; height: auto; max-width: 500px; aspect-ratio: 1/1;"></canvas>
            </div>
            <div class="stats-panel">
                <div class="stat-card"><div class="stat-value" id="totalEnergy">0</div><div class="stat-label">Всего энергии</div></div>
                <div class="stat-card"><div class="stat-value" id="totalPlayers">0</div><div class="stat-label">Участников</div></div>
                <div class="stat-card"><div class="stat-value" id="activeFaces">0</div><div class="stat-label">Закрашено граней</div></div>
            </div>
            <div class="faces-info">
                <h3>✨ Закрашивание граней</h3>
                <div class="face-list" id="faceList"></div>
            </div>
        </div>

        <div id="resultsTab" class="tab-content">
            <div class="podium" id="podium"></div>
            <div class="table-container">
                <div class="table-header"><div>МЕСТО</div><div>УЧАСТНИК</div><div>ЭНЕРГИЯ</div><div>✨</div></div>
                <div id="leaderboardRows"></div>
            </div>
        </div>

        <div class="footer">
            <div class="update-time" id="updateTime">Обновление...</div>
            <div style="display: flex; gap: 10px;">
                <button class="refresh-btn" onclick="loadData()"><i class="fas fa-sync-alt"></i> ОБНОВИТЬ</button>
                <button class="reset-btn" onclick="resetData()"><i class="fas fa-trash"></i> СБРОСИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxkqRPD0Sg7FYfrXI8TZY_dqnV-ms6zXhzfrT2-wfDyRiPPNmCuNYoKYG4hvPKwvjX7/exec';
        const MAX_ENERGY = 10000;
        const FACES_COUNT = 12;
        let currentData = null;

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }
        function getPlayerName(player) {
            return player.userName || player.userId || 'Аноним';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'polyhedron') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('polyhedronTab').classList.add('active');
                if (currentData) updatePolyhedronTab(currentData);
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('resultsTab').classList.add('active');
                if (currentData) displayResults(currentData);
            }
        }

        function getEnergyThreshold(faceIndex) {
            return Math.ceil((faceIndex + 1) / FACES_COUNT * MAX_ENERGY);
        }
        function getLitFaces(energy) {
            const lit = [];
            for (let i = 0; i < FACES_COUNT; i++) if (energy >= getEnergyThreshold(i)) lit.push(i);
            return lit;
        }
        function drawPolyhedron(energy) {
            const canvas = document.getElementById('polyhedronCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const centerX = size / 2, centerY = size / 2;
            const radius = size * 0.35;
            ctx.clearRect(0, 0, size, size);
            const litFaces = getLitFaces(energy);
            const angles = Array.from({length: FACES_COUNT}, (_, i) => i * 360 / FACES_COUNT * Math.PI / 180);
            for (let i = 0; i < FACES_COUNT; i++) {
                const angle = angles[i];
                const isLit = litFaces.includes(i);
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                const faceRadius = size * 0.08;
                for (let j = 0; j < 6; j++) {
                    const faceAngle = j * 60 * Math.PI / 180 + angle;
                    const px = x + Math.cos(faceAngle) * faceRadius;
                    const py = y + Math.sin(faceAngle) * faceRadius;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                if (isLit) { ctx.fillStyle = '#ff6b6b'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff6b6b'; }
                else { ctx.fillStyle = '#e9ecef'; ctx.shadowBlur = 0; }
                ctx.fill();
                ctx.strokeStyle = '#dee2e6';
                ctx.stroke();
                ctx.fillStyle = isLit ? 'white' : '#adb5bd';
                ctx.font = `bold ${size * 0.035}px Inter`;
                ctx.shadowBlur = 0;
                ctx.fillText(i + 1, x - 10, y + 8);
            }
            ctx.beginPath();
            ctx.arc(centerX, centerY, size * 0.12, 0, 2 * Math.PI);
            ctx.fillStyle = '#f8f9fa';
            ctx.fill();
            ctx.fillStyle = '#ff6b6b';
            ctx.font = `bold ${size * 0.07}px Inter`;
            ctx.fillText('✨', centerX - 20, centerY + 12);
            const percent = Math.min(100, Math.round((energy / MAX_ENERGY) * 100));
            ctx.fillStyle = '#333';
            ctx.font = `bold ${size * 0.04}px Inter`;
            ctx.fillText(`${percent}%`, centerX - 22, centerY + 55);
        }
        function updateFaceList(energy) {
            const litFaces = getLitFaces(energy);
            const container = document.getElementById('faceList');
            if (!container) return;
            let html = '';
            for (let i = 0; i < FACES_COUNT; i++) {
                const isLit = litFaces.includes(i);
                const threshold = getEnergyThreshold(i);
                html += `<div class="face-badge ${isLit ? 'lit' : ''}">Грань ${i+1} ${isLit ? '✓' : `(${threshold})`}</div>`;
            }
            container.innerHTML = html;
            document.getElementById('activeFaces').textContent = litFaces.length;
        }
        function updatePolyhedronTab(players) {
            const totalEnergy = players.reduce((sum, p) => sum + (p.taps || 0), 0);
            document.getElementById('totalEnergy').textContent = formatNumber(totalEnergy);
            document.getElementById('totalPlayers').textContent = players.length;
            drawPolyhedron(totalEnergy);
            updateFaceList(totalEnergy);
        }

        function displayResults(players) {
            document.getElementById('totalPlayers').textContent = players.length;
            document.getElementById('totalEnergy').textContent = formatNumber(players.reduce((s,p)=>s+(p.taps||0),0));
            let podiumHtml = '';
            if (players.length > 1) podiumHtml += `<div class="podium-card podium-2"><div class="podium-rank">2</div><div class="podium-name">${getPlayerName(players[1])}</div><div class="podium-score">${formatNumber(players[1]?.taps||0)} <small>ед.</small></div></div>`;
            else podiumHtml += `<div class="podium-card podium-2"><div class="podium-rank">2</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            if (players.length > 0) podiumHtml += `<div class="podium-card podium-1"><div class="crown">👑</div><div class="podium-rank">1</div><div class="podium-name">${getPlayerName(players[0])}</div><div class="podium-score">${formatNumber(players[0]?.taps||0)} <small>ед.</small></div></div>`;
            else podiumHtml += `<div class="podium-card podium-1"><div class="podium-rank">1</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            if (players.length > 2) podiumHtml += `<div class="podium-card podium-3"><div class="podium-rank">3</div><div class="podium-name">${getPlayerName(players[2])}</div><div class="podium-score">${formatNumber(players[2]?.taps||0)} <small>ед.</small></div></div>`;
            else podiumHtml += `<div class="podium-card podium-3"><div class="podium-rank">3</div><div class="podium-name">—</div><div class="podium-score">0</div></div>`;
            document.getElementById('podium').innerHTML = podiumHtml;
            const otherPlayers = players.slice(3);
            const rowsHtml = otherPlayers.map((player, idx) => {
                const rank = idx + 4;
                const avatarSymbol = getPlayerName(player).charAt(0).toUpperCase() || '✨';
                return `<div class="table-row"><div class="rank">${rank}</div><div class="user-info"><div class="avatar">${avatarSymbol}</div><span class="username">${getPlayerName(player)}</span></div><div class="score">${formatNumber(player.taps||0)}</div><div class="trend">✨</div></div>`;
            }).join('');
            document.getElementById('leaderboardRows').innerHTML = rowsHtml || '<div class="empty-state"><i class="fas fa-star"></i><br>Нет данных</div>';
        }

        async function loadData() {
            try {
                const response = await fetch(API_URL + '?t=' + Date.now());
                const data = await response.json();
                if (data.success && data.data) {
                    currentData = data.data;
                    if (document.getElementById('polyhedronTab').classList.contains('active')) updatePolyhedronTab(currentData);
                    else displayResults(currentData);
                    document.getElementById('updateTime').innerHTML = `🕐 Обновлено: ${new Date().toLocaleTimeString()}`;
                } else {
                    if (document.getElementById('polyhedronTab').classList.contains('active')) updatePolyhedronTab([]);
                    else displayResults([]);
                }
            } catch(error) { console.error('Ошибка:', error); }
        }

        async function resetData() {
            if (!confirm('⚠️ Удалить все данные? Продолжить?')) return;
            const statusEl = document.getElementById('updateTime');
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Очистка...';
            try {
                const response = await fetch(API_URL + '?reset=1&t=' + Date.now());
                const data = await response.json();
                if (data.success) { alert('✅ Данные очищены'); loadData(); }
                else { alert('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка')); statusEl.innerHTML = 'Обновление...'; }
            } catch(error) { alert('❌ Ошибка соединения'); statusEl.innerHTML = 'Обновление...'; }
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
